# ============================================================
# sample-workload.yaml
# Hybrid PSO-ACO Kubernetes Workloads
# Modified for Runtime Monitoring and Metrics Collection
# ============================================================

# ------------------------------------------------------------
# Small GoCJ-Inspired Task
# 1 CPU Core, 2GB Memory
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: gocj-task-small
  labels:
    app: gocj-workload
    dataset: gocj
    workload: small
spec:
  schedulerName: green-scheduler
  restartPolicy: Never

  containers:
    - name: task
      image: python:3.11-slim

      command:
        - python
        - -c
        - |
          import time
          print("Starting small workload...")
          time.sleep(600)
          print("Small workload completed.")

      resources:
        requests:
          cpu: "1000m"
          memory: "2Gi"

        limits:
          cpu: "1000m"
          memory: "2Gi"

