---
# ============================================================
# Batch-Oriented Kubernetes Job
# Simulates Large-Scale Cloud Workloads
# ============================================================

apiVersion: batch/v1
kind: Job

metadata:
  name: gocj-batch-job

spec:

  parallelism: 5
  completions: 20

  template:

    metadata:
      labels:
        app: gocj-batch

    spec:

      schedulerName: green-scheduler
      restartPolicy: Never

      containers:
        - name: batch-task

          image: python:3.11-slim

          command:
            - python
            - -c
            - |
                import time
                import random

                duration = random.uniform(300, 600)

                print(f"Running batch workload for {duration:.1f} seconds")

                time.sleep(duration)

                print("Batch workload completed")

          resources:

            requests:
              cpu: "1000m"
              memory: "2Gi"

            limits:
              cpu: "2000m"
              memory: "4Gi"